services:
  web:
    image: ${DOCKER_USERNAME}/todo-app:latest
    container_name: node_app
    ports:
      - "3000:3000"
    volumes:
    env_file:
      - .env
    depends_on:
      - db
  db:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: