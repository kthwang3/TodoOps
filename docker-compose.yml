services:
  nginx:
    image: nginx:1-alpine
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
  web:
    restart: always
    image: kthwang3/todo-app:latest
    container_name: node_app
    env_file:
      - .env
    depends_on:
      - db
  db:
    restart: always
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: