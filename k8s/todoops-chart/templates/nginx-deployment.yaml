apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment  
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.nginx.replicas }}
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: {{ .Values.nginx.image }}
        ports:
          - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
        resources:
          requests:
            cpu: {{ .Values.nginx.cpuRequest }}
            memory: {{ .Values.nginx.memRequest }}
          limits:
            cpu: {{ .Values.nginx.cpuLimit }}
            memory: {{ .Values.nginx.memLimit }}
        livenessProbe:
          httpGet:
            path: /todos
            port: 80
          initialDelaySeconds: {{ .Values.nginx.livenessInitialDelaySeconds }}
          periodSeconds: {{ .Values.nginx.livenessPeriodSeconds }}
        readinessProbe:
          httpGet:
            path: /todos
            port: 80
          initialDelaySeconds: {{ .Values.nginx.readinessInitialDelaySeconds }}
          periodSeconds: {{ .Values.nginx.readinessPeriodSeconds }}
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config